parameters:
  - name: name
    type: string
    displayName: Additional name for the pipeline step
    default: ""
  - name: IgnoreScenariosWithMissingVhd
    type: boolean
    displayName: Ignore tests where the VHD can't be loaded
  - name: variableGroup
    type: string
    displayName: Variable group to use for e2e tests
    default: ab-e2e
  - name: subscriptionId
    type: string
    displayName: Subscription ID to use for E2E tests (empty = use variable group default)
    default: ""
  - name: failedTestsRetryCount
    type: number
    displayName: Number of times to retry failed E2E tests
    default: 0
  - name: useVhdMetadataArtifacts
    type: boolean
    displayName: Resolve VHDs from metadata artifacts produced by this pipeline
    default: false
  - name: rcv1pTagsAutoInjected
    type: boolean
    displayName: |
      Set to true when the target subscription auto-injects the RCV1P opt-in VMSS tag
      (platformsettings.host_environment.service.platform_optedin_for_rootcerts).
      When true, RCV1P negative tests (e.g. Test_RCV1P_Windows_NotOptedIn) are skipped
      because they cannot verify the not-opted-in behavior on such subscriptions.
      Msft tenant E2E subs auto-inject; the RCV1P subscription does not.
    default: true

jobs:
  - job: e2e
    condition: and(succeeded(), ne(variables.SKIP_E2E_TESTS, 'true'))
    variables:
      - group: ${{parameters.variableGroup}} # all variables prefixed with E2E_* come from this variable group
      # When a caller (e.g. aks-rp orchestrator) explicitly passes subscriptionId,
      # override E2E_SUBSCRIPTION_ID from the variable group so the run targets the
      # requested subscription (e.g. RCV1P). When empty, keep the variable group default.
      - ${{ if ne(parameters.subscriptionId, '') }}:
        - name: E2E_SUBSCRIPTION_ID
          value: ${{parameters.subscriptionId}}
    pool:
      name: $(E2E_POOL_NAME)
    timeoutInMinutes: 90
    displayName: Run AgentBaker E2E ${{parameters.name}}
    steps:
      - checkout: self
        # s is the default path for repositories - if we don't set this when using multiple repsositories, then it is the repo name
        # "s/AgentBaker", but most of the pipeline variables still refer to "s" and many of the scripts below fail.
        path: s
        fetchTags: false
        fetchDepth: 1

      - ${{ if eq(parameters.useVhdMetadataArtifacts, true) }}:
        - task: DownloadPipelineArtifact@2
          displayName: Download E2E VHD metadata
          inputs:
            buildType: current
            itemPattern: 'e2e-vhd-metadata-*/**/*.json'
            targetPath: $(Pipeline.Workspace)/e2e-vhd-metadata

        - bash: |
            set -euo pipefail

            metadata_dir="$(Pipeline.Workspace)/e2e-vhd-metadata"
            metadata_file="$(Build.SourcesDirectory)/e2e-vhd-metadata.json"
            # Pipeline artifacts are immutable, so rerun attempts publish uniquely suffixed
            # artifacts. Sort naturally by attempt so metadata from the latest attempt wins.
            mapfile -d '' metadata_files < <(find "$metadata_dir" -type f -name '*.json' -print0 | sort -zV)
            if [ "${#metadata_files[@]}" -eq 0 ]; then
              echo "##vso[task.logissue type=error]No E2E VHD metadata artifacts were downloaded" >&2
              exit 1
            fi

            jq -s 'reduce .[] as $item ({}; . * $item)' "${metadata_files[@]}" > "$metadata_file"
            echo "##vso[task.setvariable variable=E2E_VHD_METADATA_FILE]$metadata_file"
          displayName: Merge E2E VHD metadata

      - task: AzureCLI@2
        inputs:
          azureSubscription: $(E2E_ARM_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            bash .pipelines/scripts/e2e_run.sh
        displayName: Run AgentBaker E2E
        env:
          SYS_SSH_PUBLIC_KEY: $(SYS_SSH_PUBLIC_KEY)
          SYS_SSH_PRIVATE_KEY_B64: $(SYS_SSH_PRIVATE_KEY_B64)
          BUILD_SRC_DIR: $(System.DefaultWorkingDirectory)
          DefaultWorkingDirectory: $(Build.SourcesDirectory)
          VHD_BUILD_ID: $(VHD_BUILD_ID)
          IGNORE_SCENARIOS_WITH_MISSING_VHD: ${{parameters.IgnoreScenariosWithMissingVhd}}
          E2E_FAILED_TESTS_RETRY_COUNT: ${{parameters.failedTestsRetryCount}}
          RCV1P_TAGS_AUTO_INJECTED: ${{parameters.rcv1pTagsAutoInjected}}
          ${{ if eq(parameters.useVhdMetadataArtifacts, true) }}:
            E2E_VHD_METADATA_FILE: $(E2E_VHD_METADATA_FILE)

      - task: PublishTestResults@2
        displayName: Upload test results
        condition: succeededOrFailed()
        inputs:
          testRunner: JUnit
          testResultsFiles: "$(Build.SourcesDirectory)/e2e/report.xml"

      - publish: $(System.DefaultWorkingDirectory)/e2e/$(LOGGING_DIR)
        artifact: $(LOGGING_DIR)
        condition: always()
        continueOnError: true

      - task: AzureCLI@2
        inputs:
          azureSubscription: $(E2E_ARM_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            bash .pipelines/scripts/e2e_delete_vmss.sh
        displayName: ensure vmss deletion
        condition: always()
