name: Hotfix Template Update
# Auto-detects whether a hotfix is needed for a PR targeting an official/* release
# branch and, if so, computes the version numbers and updates the generated files:
#   - If aks-node-controller/ changed vs the base branch, bumps `version`.
#   - If parts/linux/cloud-init/nodecustomdata.yml ends up changed vs the base branch
#     (either directly, or via auto-injection of changed CSE scripts), bumps
#     `scripts_version`.
#   - Writes the result to
#     parts/linux/cloud-init/artifacts/aks-node-controller-hotfix.json (embedded
#     directly into scriptless customData by pkg/agent/baker.go).
#
# See hotfix/hotfix_generate.py for the full algorithm.
#
# Triggers:
# 1. Automatically when a PR targets an official/* release branch
# 2. Manually when a "hotfix" label is added to any PR
on:
  pull_request:
    branches:
      - 'official/**'
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [labeled]

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  hotfix-generate:
    # Run if: PR targets official/* branch, OR "hotfix" label was just added (same-repo PRs only)
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event_name == 'pull_request' && startsWith(github.base_ref, 'official/')) ||
        (github.event_name == 'pull_request_target' && github.event.label.name == 'hotfix')
      )
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_KV_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_KV_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_KV_SUBSCRIPTION_ID }}

      - name: Retrieve App private key
        uses: azure/cli@v3
        id: app-private-key
        with:
          azcliversion: latest
          inlineScript: |
            private_key=$(az keyvault secret show --vault-name ${{ secrets.AZURE_KV_NAME }} -n ${{ secrets.APP_PRIVATE_KEY_SECRET_NAME }} --query value -o tsv | sed 's/$/\\n/g' | tr -d '\n' | head -c -2) &> /dev/null
            echo "::add-mask::$private_key"
            echo "private-key=$private_key" >> $GITHUB_OUTPUT

      - name: Generate App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ steps.app-private-key.outputs.private-key }}
          repositories: AgentBaker

      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Generate hotfix files
        run: |
          python3 hotfix/hotfix_generate.py "origin/${{ github.base_ref }}"

      - name: Commit changes via API
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FILES=(
            "parts/linux/cloud-init/nodecustomdata.yml"
            "parts/linux/cloud-init/artifacts/aks-node-controller-hotfix.json"
          )
          CHANGED=0
          for FILE in "${FILES[@]}"; do
            # git diff --quiet misses untracked files (e.g. the target hotfix json on
            # its first-ever generation on this branch), so use `git status
            # --porcelain` instead, which reports both modified and untracked paths.
            if [ -z "$(git status --porcelain -- "$FILE")" ]; then
              continue
            fi
            CHANGED=1
            CONTENT=$(base64 -w 0 "$FILE")
            # For a brand-new file the Contents API lookup 404s (no sha yet); the
            # step runs under `bash -e`, so guard the lookup and only pass -f sha
            # when the file already exists on the branch, otherwise the PUT must
            # omit sha entirely to create the file.
            SHA=$(gh api "repos/${{ github.repository }}/contents/${FILE}?ref=${{ github.head_ref }}" --jq '.sha' 2>/dev/null || true)
            if [ -n "$SHA" ]; then
              gh api "repos/${{ github.repository }}/contents/${FILE}" \
                -X PUT \
                -f message="chore: auto-generate hotfix content for ${FILE}" \
                -f content="$CONTENT" \
                -f branch="${{ github.head_ref }}" \
                -f sha="$SHA"
            else
              gh api "repos/${{ github.repository }}/contents/${FILE}" \
                -X PUT \
                -f message="chore: auto-generate hotfix content for ${FILE}" \
                -f content="$CONTENT" \
                -f branch="${{ github.head_ref }}"
            fi
          done
          if [ "$CHANGED" -eq 0 ]; then
            echo "No template changes needed."
          fi
